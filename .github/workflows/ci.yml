name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

    job1:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4
          - name: Set up JDK
            uses: actions/setup-java@v4
            with:
              distribution: temurin
              java-version: '25'

          - name: Build project
            run: ./gradlew build

    job2:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: '25'

            - name: Run tests
              run: ./gradlew test

    job3:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: '25'

            - name: Check formatting
              run: ./gradlew spotlessCheck
